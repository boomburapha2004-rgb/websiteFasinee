<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About Me - บูรพา ม่านกลาง</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sarabun', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }
    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 30px; background: rgba(10,10,10,0.92); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.08); }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 700; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 24px; list-style: none; }
    .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
    .nav-links a:hover { color: #fff; }
    .nav-search { background: none; border: none; color: rgba(255,255,255,0.7); font-size: 1.1rem; cursor: pointer; }
    .hero { padding-top: 110px; padding-bottom: 55px; background: linear-gradient(180deg, #fbd46856 0%, #b9422d 60%, #922a18 100%); text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at center, rgba(99,102,241,0.15) 0%, transparent 70%); }
    .hero-title { font-size: 3.2rem; font-weight: 700; letter-spacing: 8px; text-transform: uppercase; position: relative; animation: fadeDown 0.7s ease both; }
    .hero-line { width: 600px; max-width: 80%; height: 2px; background: linear-gradient(90deg, transparent, #fdce56, transparent); margin: 18px auto 0; animation: fadeDown 0.9s ease 0.2s both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }
    .content { background: linear-gradient(135deg, #f6c7bf 0%, #e07a6a 40%, #c94f3a 70%, #AC3520 100%); padding: 70px 40px; min-height: 60vh; display: flex; align-items: center; justify-content: center; }
    .about-card { display: flex; align-items: flex-start; gap: 55px; max-width: 880px; width: 100%; animation: fadeUp 0.8s ease 0.2s both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }
    .photo-wrapper { flex-shrink: 0; width: 195px; height: 255px; overflow: hidden; background: #1e3a5f; display: flex; align-items: center; justify-content: center; }
    .photo-wrapper img { width: 100%; height: 100%; object-fit: cover; }
    .photo-placeholder { color: rgba(255,255,255,0.35); font-size: 0.8rem; text-align: center; padding: 10px; line-height: 1.8; }
    .info { display: flex; flex-direction: column; gap: 14px; padding-top: 8px; }
    .info-row { font-size: 0.9rem; color: #fff; letter-spacing: 0.8px; line-height: 1.7; text-transform: uppercase; }
    .info-row.name { font-size: 1rem; font-weight: 700; color: #ffffff; }
    .info-row a { color: #ffe08a; text-decoration: underline; text-transform: none; }
    .info-row a:hover { color: #fff; }
    .back-btn { display: inline-block; margin-top: 20px; padding: 10px 28px; border: 1.5px solid rgba(255,255,255,0.6); color: white; text-decoration: none; font-family: 'Sarabun', sans-serif; font-size: 0.88rem; letter-spacing: 1px; border-radius: 2px; transition: all 0.2s; }
    .back-btn:hover { background: rgba(255,255,255,0.15); border-color: white; }
    @media (max-width: 640px) { .about-card { flex-direction: column; align-items: center; } .info { align-items: center; text-align: center; } .hero-title { font-size: 2rem; letter-spacing: 4px; } }
  </style>
</head>
<body>
  <nav>

    </ul>

  <section class="hero">

  <section class="content">

      <div class="photo-wrapper">
        <img src="./profile.jpg" alt="บูรพา ม่านกลาง"
          onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
        <div class="photo-placeholder" style="display:none;">📷<br>profile.jpg</div>
      </div>
      <div class="info">
        <div class="info-row name">MR. BURAPHA &nbsp; MANKLANG</div>

          KING MONGKUT'S UNIVERSITY OF TECHNOLOGY NORTH BANGKOK
        </div>
        <div class="info-row">
          EMAIL : <a href="mailto:boomburapha2004&#64;gmail.com">boomburapha2004&#64;gmail.com</a>
        </div>
        <div class="info-row">TEL : 064-037-8258</div>
        <a href="v1.html" class="back-btn">← กลับหน้าแรก</a>
      </div>
    </div>
  </section>
</body>
</html>
