<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>เทอม 2/2570 - </title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Sarabun', sans-serif; background: #0a0a0a; color: white; min-height: 100vh; }

    nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 14px 30px; background: rgba(255,255,255,0.97); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0,0,0,0.08); }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 700; letter-spacing: 1px; color: #1a4a7a; }
    .nav-logo img { width: 36px; height: 36px; object-fit: contain; }
    .nav-links { display: flex; align-items: center; gap: 24px; list-style: none; }
    .nav-links a { color: rgba(30,60,100,0.85); text-decoration: none; font-size: 0.95rem; transition: color 0.2s; }
    .nav-links a:hover { color: #1a4a7a; }
    .nav-search { background: none; border: none; color: rgba(30,60,100,0.8); font-size: 1.1rem; cursor: pointer; }

    /* HERO - โทนฟ้า */
    .hero {
      padding-top: 120px;
      padding-bottom: 55px;
      background: linear-gradient(180deg, #a8d8f0 0%, #4a9fd4 40%, #1a6fa8 100%);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(60deg, transparent, transparent 38px, rgba(255,255,255,0.07) 38px, rgba(255,255,255,0.07) 40px),
        repeating-linear-gradient(-60deg, transparent, transparent 38px, rgba(255,255,255,0.07) 38px, rgba(255,255,255,0.07) 40px);
    }

    .hero-title { font-size: 3rem; font-weight: 700; letter-spacing: 4px; position: relative; animation: fadeDown 0.8s ease both; }
    .hero-line { width: 400px; max-width: 80%; height: 2px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent); margin: 16px auto 0; animation: fadeDown 1s ease 0.2s both; }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-18px); } to { opacity: 1; transform: translateY(0); } }

    /* CONTENT - โทนฟ้า */
    .content {
      background: linear-gradient(135deg, #5bb8e8 0%, #2e8fc4 35%, #1565a0 70%, #0d4a7a 100%);
      min-height: 70vh;
      padding: 60px 30px 80px;
      position: relative;
      overflow: hidden;
    }

    .stars { position: absolute; inset: 0; pointer-events: none; }
    .star { position: absolute; border-radius: 50%; background: rgb(255, 255, 255); animation: twinkle var(--d, 3s) ease-in-out infinite alternate; }
    @keyframes twinkle { from { opacity: 0.05; } to { opacity: 0.6; } }

    .inner { position: relative; z-index: 2; max-width: 860px; margin: 0 auto; animation: fadeUp 0.8s ease 0.3s both; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(25px); } to { opacity: 1; transform: translateY(0); } }

    .project-title { font-size: 1.15rem; font-weight: 600; color: #fff; text-align: center; line-height: 1.8; margin-bottom: 40px; padding: 0 20px; text-shadow: 0 1px 4px rgba(0,0,0,0.3); }
    .images-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; margin-bottom: 36px; }
    .img-box { overflow: hidden; border: 1px solid rgba(255,255,255,0.3); background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; }
    .img-box img { width: 100%; height: 100%; object-fit: cover; }
    .img-placeholder { color: rgba(255,255,255,0.5); font-size: 0.85rem; text-align: center; line-height: 2; padding: 20px; }

    .detail-box { background: rgba(0,0,0,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 24px 28px; line-height: 2; font-size: 0.92rem; color: #fff; margin-bottom: 30px; }
    .detail-box p { margin-bottom: 6px; }

    .back-btn { display: inline-block; padding: 10px 28px; border: 1.5px solid rgba(255,255,255,0.6); color: white; text-decoration: none; font-family: 'Sarabun', sans-serif; font-size: 0.9rem; border-radius: 3px; transition: all 0.2s; }
    .back-btn:hover { background: rgba(255,255,255,0.15); border-color: white; }
  </style>
</head>
<body>

  <nav>
    <div class="nav-logo">
      <img src="./logo.png.png" alt="Logo" onerror="this.style.display='none'">
      <span>Home</span>
    </div>
    <ul class="nav-links">
      <li><a href="index.html">หน้าแรก</a></li>
      <li><a href="v3.html">Activity</a></li>
    </ul>
    <button class="nav-search">🔍</button>
  </nav>

  <section class="hero">
    <h1 class="hero-title">เทอม 2/2570</h1>
    <div class="hero-line"></div>
  </section>

  <section class="content">
    <div class="stars" id="stars"></div>
    <div class="inner">

      <p class="project-title">
        ชื่อกิจกรรม<br>
      </p>

      <div class="images-row">
        <div class="img-box" style="width:480px; height:320px;">
          <img src="./t6.html" alt="กิจกรรมเทอม 2/2570"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
          <div class="img-placeholder" style="display:none;">
            📷<br>ยังไม่มีรูป<br>ตั้งชื่อไฟล์ว่า <strong>t6.jpg</strong><br>แล้ววางในโฟลเดอร์เดียวกัน
          </div>
        </div>
      </div>

      <div class="detail-box">
       <p>📅 วันที่จัดกิจกรรม : </p>
        <p>📍 สถานที่ : </p>
        <p>📝 รายละเอียด : </p>
      </div>

      <a href="v3.html" class="back-btn">← กลับหน้าผลงาน</a>

    </div>
  </section>

  <script>
    const c = document.getElementById('stars');
    for (let i = 0; i < 200; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      s.style.left = Math.random() * 100 + '%';
      s.style.top  = Math.random() * 100 + '%';
      s.style.setProperty('--d', (1 + Math.random() * 3) + 's');
      s.style.animationDelay = (Math.random() * 4) + 's';
      s.style.width = s.style.height = (Math.random() * 3 + 1) + 'px';
      c.appendChild(s);
    }
  </script>

</body>
</html>
